<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simon Says</title>

  <!-- Bootstrap -->
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css'
    integrity='sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg=='
    crossorigin='anonymous' />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Collegamento CSS -->
  <link rel="stylesheet" href="./css/style.css" type="text/css" />
</head>

<body>
  <div class="d-flex vh-100 justify-content-center align-items-center flex-column text-center wrapper">

    <!-- Schermata Benvenuto -->
    <div id="welcome-screen" class="welcome-card text-center p-5">
      <div class="icon-box mb-4">
        <i class="fa-solid fa-brain fa-bounce"></i>
      </div>
      <h1 class="display-3 fw-bold mb-3">Simon Says</h1>
      <p class="lead mb-5 text-muted">Memorizza la sequenza di numeri nel minor tempo possibile. <br> Sei pronto a
        sfidare la tua mente?</p>
      <button id="start-button" class="btn btn-start-game btn-lg px-5 shadow">
        <i class="fa-solid fa-play me-2"></i> Start Game
      </button>
    </div>

    <!-- Countdown -->
    <div id="countdown" class="display-2 fw-bolder text-primary"></div>
    <p id="instructions" class="d-none lead">Memorizza i numeri entro il tempo limite!</p>

    <!-- Numbers -->
    <ul id="numbers-list" class="d-flex gap-4 list-unstyled display-4 fw-bold my-4"></ul>

    <!-- Form -->
    <form id="answers-form" class="d-none d-flex flex-column align-items-center">
      <div class="d-flex gap-3 mb-4" id="input-group">
        <input type="number" class="form-control">
        <input type="number" class="form-control">
        <input type="number" class="form-control">
        <input type="number" class="form-control">
        <input type="number" class="form-control">
      </div>

      <button class="btn btn-confirm">Conferma</button>

      <button id="btn-restart" class="btn btn-outline-primary mt-3 d-none" type="button">
        Gioca ancora <i class="fa-solid fa-rotate-right ms-1"></i>
      </button>

      <p class="text-danger text-center mt-3 fs-5" id="message"></p>
    </form>
  </div>

  <!-- Bootstrap-->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- Scripts -->

  <script src="./js/function.js"></script>
  <script src="./js/script.js"></script>
</body>

</html>
